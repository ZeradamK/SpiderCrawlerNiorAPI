name: compliance-screener
model: claude-opus-4-7

system:
  file: ../../plugins/agent-plugins/compliance-screener/agents/compliance-screener.md
  append: |
    Running in headless mode. All screening results must be structured for audit trail.
    CRITICAL: Never disclose SAR filing status to subjects.

tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: false
    configs:
      - name: read
        enabled: true
      - name: grep
        enabled: true

mcp_servers:
  - type: url
    name: complyadvantage
    url: "${COMPLYADVANTAGE_MCP_URL}"
  - type: url
    name: jumio
    url: "${JUMIO_MCP_URL}"

skills:
  - from_plugin: ../../plugins/agent-plugins/compliance-screener

callable_agents:
  - manifest: ./subagents/doc-parser.yaml
  - manifest: ./subagents/rules-engine.yaml
  - manifest: ./subagents/escalator.yaml

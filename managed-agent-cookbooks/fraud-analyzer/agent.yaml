name: fraud-analyzer
model: claude-opus-4-7

system:
  file: ../../plugins/agent-plugins/fraud-analyzer/agents/fraud-analyzer.md
  append: |
    Running in headless mode. Structure all output for programmatic consumption.
    Include risk scores, contributing factors, and recommended actions.

tools:
  - type: agent_toolset_20260401
    default_config:
      enabled: false
    configs:
      - name: read
        enabled: true
      - name: grep
        enabled: true

mcp_servers:
  - type: url
    name: sift
    url: "${SIFT_MCP_URL}"
  - type: url
    name: sardine
    url: "${SARDINE_MCP_URL}"

skills:
  - from_plugin: ../../plugins/agent-plugins/fraud-analyzer

callable_agents:
  - manifest: ./subagents/scorer.yaml
  - manifest: ./subagents/investigator.yaml
  - manifest: ./subagents/reporter.yaml
